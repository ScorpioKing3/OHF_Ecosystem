    <script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ==========================================
// 📖 THE LORE ENGINE
// ==========================================
const getStoryEvent = (sector, week) => {
  const specificLogs = {
    'S1W1': { char: "Captain Truffles", title: "Log 001: The Retrofit", text: "We were a peaceful people. The mud of Sector 4 was rich, and our Aether-Slop fed a dozen star systems. But the Obsidian Consortium doesn't negotiate. When their dreadnoughts appeared, Engineer Oinks and I had no choice but to retrofit the old barns with methane thrusters. We survive by the soil, and we'll die for it if we have to." },
    'S1W2': { char: "Engineer Oinks", title: "Log 002: Holding It Together", text: "Captain wants more yield, but he doesn't see the sparks flying out of the primary methane manifold! The Void out here is brutal. Micro-asteroids are chewing up our exterior plating. If we exceed our crop quotas, we can use the bio-resin excess purely to patch the hull. Focus on the quota, but don't let the ship decompress!" },
    'S1W3': { char: "Elder Hooves", title: "Log 003: The Old Magic", text: "The young ones rely on their laser-scythes, but they forget the old ways. The Dark Truffles and Chrono-Roots we brought from the homeworld still sing with ancient Aether. If you wish to acquire the rarest seeds, you must tap into the Ancient Ledger. They require $HAM tokens—true cryptographic essence." },
    'S1W4': { char: "Uni-Scout Sparky", title: "Log 004: The Auditor Approaches", text: "Sensors are picking up a massive gravitational wake! It's a Consortium Auditor-Class Dreadnought. Their quota this week is astronomical. Overclock the starlight arrays and harvest everything. If we fail, they won't just take the ship... they'll take the herd." },
    'S2W1': { char: "Intercepted Consortium Comms", title: "Encrypted Channel #88-A", text: "[STATIC]... rogue agricultural vessel designated 'Truffle Hunter' has jumped to Sector 2. They survived the audit. Dispatch harpoon-frigates. Confiscate their yield. Leave no survivors... [STATIC]" },
    'S3W1': { char: "Captain Truffles", title: "Log 012: Deep Space", text: "We're further from home than any Unipiggy has ever been. The starlight out here is cold, but the hydroponics bay remains warm. We keep planting. We keep moving." },
    'S5W1': { char: "Unknown Scrap-Trader", title: "Hailing Frequency Open", text: "You folks are crazy flying that retrofitted barn out here! The Ashen Directorate controls this sector. But hey, your Radh spends just as good as Consortium Credits. Check the Supply Depot, I've got some expansion pods for you." },
    'S10W4': { char: "Captain Truffles", title: "Log 040: The Final Harvest", text: "This is it. The Consortium Flagship is blockading the warp gate. If we can meet this final, impossible quota, we overload our engines with Aether-Slop and blast right through them. To all Unipiggies: Man your stations. Let's grow." }
  };

  const key = `S${sector}W${week}`;
  if (specificLogs[key]) return specificLogs[key];

  const proceduralLogs = [
    { char: "Engineer Oinks", title: "Maintenance Report", text: "Hull integrity holding, but just barely. I had to route auxiliary power from the life support to keep the UV lights on in Bay 4. Don't waste energy today." },
    { char: "Uni-Scout Sparky", title: "Navigational Update", text: "Asteroid density increasing. We're going to take some passive hull damage tonight. Make sure the crops yield enough excess to patch us up!" },
    { char: "Elder Hooves", title: "Botanical Observation", text: "The void berries are reacting strangely to the cosmic radiation in this sector. Their roots are weaving through the ship's bulkheads. It is beautiful, but unsettling." },
    { char: "Intercepted Merchant Signal", title: "Warning Broadcast", text: "To any independent vessels: Consortium patrols are aggressively auditing all organics in this quadrant. Hide your truffles. May the Void be merciful." },
    { char: "Captain Truffles", title: "Crew Morale Update", text: "The crew is tired, but the smell of fresh Aether-Wheat keeps their spirits up. Every week we survive is another week we defy the Consortium. Keep planting." }
  ];

  return proceduralLogs[Math.floor(Math.random() * proceduralLogs.length)];
};

// ==========================================
// 🌱 CROP & CARD DATABASE
// ==========================================
const CROPS = {
  slop: { name: 'Quantum Slop', maxGrowth: 2, yield: 5, color: 'text-emerald-400' },
  star_wheat: { name: 'Aether Wheat', maxGrowth: 1, yield: 3, color: 'text-amber-400' },
  truffle: { name: 'Dark Truffle', maxGrowth: 3, yield: 15, color: 'text-fuchsia-400' },
  void_berry: { name: 'Void Berry', maxGrowth: 2, yield: 8, color: 'text-cyan-400' },
  chrono_root: { name: 'Chrono-Root', maxGrowth: 4, yield: 30, color: 'text-rose-400' },
  genesis: { name: 'Genesis Sprout', maxGrowth: 5, yield: 60, color: 'text-indigo-400' }
};

const CARD_DB = [
  // --- CORE SET ---
  { id: 'c1', name: 'Sow Quantum Slop', cost: 1, type: 'seed', cropType: 'slop', desc: 'Yields 5.', flavor: 'Staple diet of the stars.' },
  { id: 'e1', name: 'Struct-Patch', cost: 1, type: 'engineering', healHull: 10, desc: 'Repair 10 Hull.', flavor: 'Duct tape and hope.' },
  { id: 'ch2', name: 'Engineer Oinks', cost: 2, type: 'character', energy: 2, healHull: 10, desc: 'Gain 2 Energy. Repair 10 Hull.', flavor: 'Perpetually stressed.' },

  // --- ASTRAL HARVEST SPECIALTY SET (Bought with Radh) ---
  { id: 'c2', name: 'Sow Aether Wheat', cost: 1, type: 'seed', cropType: 'star_wheat', desc: 'Yields 3.', flavor: 'Bakes into gravity-defying bread.' },
  { id: 'c3', name: 'Sow Dark Truffle', cost: 2, type: 'seed', cropType: 'truffle', desc: 'Yields 15.', flavor: 'Prized by Syndicate elites.' },
  { id: 'c4', name: 'Sow Void Berry', cost: 1, type: 'seed', cropType: 'void_berry', desc: 'Yields 8.', flavor: 'Tastes like ozone and nostalgia.' },
  { id: 'c5', name: 'Sow Chrono-Root', cost: 3, type: 'seed', cropType: 'chrono_root', desc: 'Yields 30.', flavor: 'Grows backwards in time.' },
  { id: 'n1', name: 'Hydro-Hose', cost: 1, type: 'nurture', growth: 1, desc: 'Advance planted crops 1 stage.', flavor: 'Mineral-rich water.' },
  { id: 'n2', name: 'Starlight Array', cost: 2, type: 'nurture', growth: 2, desc: 'Advance planted crops 2 stages.', flavor: 'Simulated yellow dwarf rays.' },
  { id: 'h1', name: 'Rusty Scythe', cost: 1, type: 'harvest', multiplier: 1, desc: 'Harvest fully grown crops.', flavor: 'Old reliable.' },
  { id: 'h2', name: 'Combine', cost: 2, type: 'harvest', multiplier: 1.5, desc: 'Harvest fully grown crops. 1.5x Yield!', flavor: 'Clears a bay in seconds.' },
  { id: 'exp1', name: 'Hydro-Pod Expansion', cost: 3, type: 'expansion', plots: 1, exhausts: true, desc: 'Add 1 empty hydroponic tube. (Max 8). Exhausts for the run.', flavor: 'More room for more slop.' },

  // --- MYTHIC SET (Bought ONLY with $HAM in the Ancient Ledger - Cross-Game NFTs) ---
  { id: 'm1', name: 'Sow Genesis Seed', cost: 4, type: 'seed', cropType: 'genesis', isMythic: true, priceHam: 5, desc: 'Yields 60. Extremely slow growth.', flavor: 'The origin of all Aether.' },
  { id: 'm2', name: 'Chrono-Sphere', cost: 3, type: 'nurture', growth: 4, isMythic: true, priceHam: 3, desc: 'Advance ALL planted crops by 4 stages.', flavor: 'Time in a bottle.' },
  { id: 'm3', name: 'Elder Hooves', cost: 2, type: 'character', growth: 2, healHull: 15, isMythic: true, priceHam: 8, desc: 'Advance crops 2 stages. Repair 15 Hull.', flavor: 'He sings to the seeds in the old tongue.' },
  { id: 'm4', name: 'Aegis Matrix', cost: 1, type: 'engineering', healHull: 40, isMythic: true, priceHam: 2, desc: 'Repair 40 Hull Integrity.', flavor: 'Pre-collapse shielding tech.' }
];

const generateUid = () => Math.random().toString(36).substr(2, 9);

const STARTING_DECK = [
  { ...CARD_DB.find(c => c.id === 'c1'), uid: generateUid() },
  { ...CARD_DB.find(c => c.id === 'c1'), uid: generateUid() },
  { ...CARD_DB.find(c => c.id === 'c1'), uid: generateUid() },
  { ...CARD_DB.find(c => c.id === 'c1'), uid: generateUid() },
  { ...CARD_DB.find(c => c.id === 'c2'), uid: generateUid() },
  { ...CARD_DB.find(c => c.id === 'c2'), uid: generateUid() },
  { ...CARD_DB.find(c => c.id === 'n1'), uid: generateUid() },
  { ...CARD_DB.find(c => c.id === 'n1'), uid: generateUid() },
  { ...CARD_DB.find(c => c.id === 'h1'), uid: generateUid() },
  { ...CARD_DB.find(c => c.id === 'h1'), uid: generateUid() },
  { ...CARD_DB.find(c => c.id === 'e1'), uid: generateUid() },
];

const getQuotaForWeek = (sector, week) => {
  const base = [30, 80, 150, 300];
  const multiplier = 1 + ((sector - 1) * 0.4);
  return Math.floor(base[week - 1] * multiplier);
};

const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);

const AstralHarvest = () => {
  // --- ECONOMY STATE ---
  const [offChainRadh, setOffChainRadh] = useState(0);
  const isTransacting = false;
  const walletAddress = null;
  const onChainHam = 0;
  const isSaving = false;
  const [notification, setNotification] = useState("");
  const EXCHANGE_RATE = 200;
  // --- META STATE ---
  const [gameState, setGameState] = useState('START');
  const [sector, setSector] = useState(1);
  const [week, setWeek] = useState(1);
  const [day, setDay] = useState(1);

  // --- SHIP STATE ---
  const [slopYield, setSlopYield] = useState(0);
  const [quota, setQuota] = useState(getQuotaForWeek(1, 1));
  const [hull, setHull] = useState(50);
  const [maxHull, setMaxHull] = useState(50);
  const [energy, setEnergy] = useState(5);
  const [maxEnergy, setMaxEnergy] = useState(5);
  const [plots, setPlots] = useState([null, null, null, null]);

  // --- DECK MANAGEMENT ---
  const [collection, setCollection] = useState([]);
  const [activeDeckUids, setActiveDeckUids] = useState([]);
  const [exhaustedUids, setExhaustedUids] = useState([]);

  const [deckState, setDeckState] = useState({ drawPile: [], hand: [], discardPile: [] });
  const { drawPile, hand, discardPile } = deckState;
  const [marketCards, setMarketCards] = useState([]);
  const [ledgerCards, setLedgerCards] = useState([]);

  // ==========================================
  // 🔔 IN-GAME NOTIFICATION SYSTEM
  // ==========================================
  const showNotification = useCallback((message) => {
    setNotification(message);
    setTimeout(() => setNotification(""), 4000);
  }, []);


  const saveProgressToCloud = async () => {};
  const connectWallet = () => alert("Web3 features disabled in this build.");
  const claimHamToWallet = () => alert("Web3 features disabled in this build.");

  // ==========================================
  // 🌱 GAME FLOW
  // ==========================================
  const startSimulation = () => {
    let collToUse = collection;
    let activeToUse = activeDeckUids;

    // FRESH WIPE / NEW GAME
    if (collection.length === 0 || hull <= 0) {
      collToUse = [...STARTING_DECK];
      activeToUse = STARTING_DECK.map(c => c.uid);
      setCollection(collToUse);
      setActiveDeckUids(activeToUse);
      setHull(50);
      setMaxHull(50);
      setSector(1);
      setPlots([null, null, null, null]);
      setExhaustedUids([]);
      if (offChainRadh === 0) setOffChainRadh(100);

      saveProgressToCloud(offChainRadh === 0 ? 100 : offChainRadh, collToUse, activeToUse, [], [null, null, null, null], 1, 1, 50);

      const activeCards = collToUse.filter(c => activeToUse.includes(c.uid));
      startWeek(activeCards, 1, 1);
    } else {
      const activeCards = collToUse.filter(c => activeToUse.includes(c.uid) && !exhaustedUids.includes(c.uid));
      startWeek(activeCards, sector, week);
    }
  };

  const startWeek = (activeCards, currentSector, currentWeek) => {
    setSector(currentSector);
    setWeek(currentWeek);
    setDay(1);
    setSlopYield(0);
    setQuota(getQuotaForWeek(currentSector, currentWeek));
    setEnergy(maxEnergy);

    const shuffledDeck = shuffle([...activeCards]);
    let initialHand = [];
    let initialDraw = [...shuffledDeck];
    for(let i=0; i<5; i++){
      if(initialDraw.length > 0) initialHand.push({...initialDraw.pop(), instanceId: Math.random()});
    }
    setDeckState({ drawPile: initialDraw, hand: initialHand, discardPile: [] });
    setGameState('STORY');
  };

  const drawCards = useCallback((amount) => {
    setDeckState(prev => {
      let newDraw = [...prev.drawPile];
      let newDiscard = [...prev.discardPile];
      let newHand = [...prev.hand];
      for (let i = 0; i < amount; i++) {
        if (newDraw.length === 0) {
          if (newDiscard.length === 0) break;
          newDraw = shuffle([...newDiscard]);
          newDiscard = [];
        }
        newHand.push({...newDraw.pop(), instanceId: Math.random()});
      }
      return { drawPile: newDraw, hand: newHand, discardPile: newDiscard };
    });
  }, []);

  const playCard = (index) => {
    const card = hand[index];
    if (energy < card.cost) return;

    let actionSuccessful = false;
    let newExhaustedUids = [...exhaustedUids];

    setPlots(currentPlots => {
      let newPlots = [...currentPlots];

      if (card.type === 'seed') {
        const emptyIndex = newPlots.findIndex(p => p === null);
        if (emptyIndex !== -1) { newPlots[emptyIndex] = { ...CROPS[card.cropType], growth: 0 }; actionSuccessful = true; }
      }
      else if (card.growth) {
        newPlots = newPlots.map(plot => {
          if (plot && plot.growth < plot.maxGrowth) { actionSuccessful = true; return { ...plot, growth: Math.min(plot.maxGrowth, plot.growth + card.growth) }; }
          return plot;
        });
        if (newPlots.some(p => p !== null)) actionSuccessful = true;
      }
      else if (card.type === 'harvest') {
        let totalHarvested = 0;
        newPlots = newPlots.map(plot => {
          if (plot && plot.growth >= plot.maxGrowth) { totalHarvested += Math.floor(plot.yield * card.multiplier); actionSuccessful = true; return null; }
          return plot;
        });
        if (totalHarvested > 0) setSlopYield(prev => prev + totalHarvested);
      }
      else if (card.type === 'expansion') {
        if (newPlots.length < 8) {
          newPlots.push(null);
          actionSuccessful = true;
        }
      }
      else { actionSuccessful = true; }

      if (actionSuccessful) {
        setEnergy(e => e - card.cost);
        if (card.energy) setEnergy(e => e + card.energy);
        if (card.healHull) setHull(h => Math.min(maxHull, h + card.healHull));

        if (card.exhausts) {
          newExhaustedUids.push(card.uid);
          setExhaustedUids(newExhaustedUids);
        }

        setDeckState(prev => {
          const newHand = [...prev.hand];
          const playedCard = newHand.splice(index, 1)[0];
          const newDiscard = card.exhausts ? prev.discardPile : [...prev.discardPile, playedCard];
          return { ...prev, hand: newHand, discardPile: newDiscard };
        });

        if (card.draw) drawCards(card.draw);
      }
      return newPlots;
    });
  };

  const endDay = () => {
    const nextPlots = plots.map(plot => {
      if (plot && plot.growth < plot.maxGrowth) return { ...plot, growth: plot.growth + 1 };
      return plot;
    });
    setPlots(nextPlots);

    const dailyDamage = 3 + Math.floor((sector * 4 + week) * 0.5);
    const newHull = hull - dailyDamage;

    if (newHull <= 0) {
      setHull(0);
      setGameState('LOSE');
      saveProgressToCloud(offChainRadh, collection, activeDeckUids, [], [null, null, null, null], 1, 1, 50);
      return;
    }

    setHull(newHull);

    if (day < 7) {
      setDay(d => d + 1);
      setEnergy(maxEnergy);
      drawCards(3);
    } else {
      if (slopYield >= quota) {
        const excess = slopYield - quota;

        const radhEarned = 15 + (sector * 10) + (week * 5);
        const newTotalRadh = offChainRadh + radhEarned;
        setOffChainRadh(newTotalRadh);

        const repairedHull = excess > 0 ? Math.min(maxHull, newHull + Math.floor(excess / 2)) : newHull;
        if (excess > 0) setHull(repairedHull);

        if (sector >= 10 && week >= 4) {
          setGameState('WIN');
        } else {
          generateMarket();
          setGameState('MARKET');
        }
        saveProgressToCloud(newTotalRadh, collection, activeDeckUids, exhaustedUids, nextPlots, sector, week, repairedHull);
      } else {
        setGameState('LOSE');
        saveProgressToCloud(offChainRadh, collection, activeDeckUids, [], [null, null, null, null], 1, 1, 50);
      }
    }
  };

  const clearRunState = () => {
    setHull(50);
    setSector(1);
    setWeek(1);
    setDay(1);
    setPlots([null, null, null, null]);
    setExhaustedUids([]);
    setGameState('START');
  };

  const openAncientLedger = () => {
    if (!walletAddress) return showNotification("Connect your Web3 wallet or activate the Mock Wallet to access the Ancient Ledger.");
    const mythicCards = CARD_DB.filter(c => c.isMythic);
    const ledger = mythicCards.map(c => ({ ...c, instanceId: generateUid() }));
    setLedgerCards(ledger);
    setGameState('LEDGER');
  };

  // ==========================================
  // 🛒 MARKET & DECK MANAGEMENT
  // ==========================================
  const generateMarket = () => {
    const standardCards = CARD_DB.filter(c => c.id !== 'c1' && c.id !== 'c2' && !c.isMythic);
    const market = [];
    const dbCopy = [...standardCards];
    for (let i = 0; i < 4; i++) {
      const rIdx = Math.floor(Math.random() * dbCopy.length);
      const card = dbCopy.splice(rIdx, 1)[0];
      let price = card.type === 'character' ? 40 + (card.cost * 10) : 15 + (card.cost * 10);
      if (card.type === 'expansion') price = 80;
      market.push({ ...card, price, instanceId: generateUid() });
    }
    setMarketCards(market);
  };

  const buyCardWithSlop = (card) => {
    if (offChainRadh >= card.price) {
      const newRadh = offChainRadh - card.price;
      const newCardWithUid = { ...CARD_DB.find(c => c.id === card.id), uid: generateUid() };

      const newCollection = [...collection, newCardWithUid];
      const newActive = [...activeDeckUids, newCardWithUid.uid];

      setOffChainRadh(newRadh);
      setCollection(newCollection);
      setActiveDeckUids(newActive);
      setMarketCards(prev => prev.filter(c => c.instanceId !== card.instanceId));

      saveProgressToCloud(newRadh, newCollection, newActive, exhaustedUids, plots, sector, week, hull);
    }
  };

  const toggleDeckCard = (uid) => {
    setActiveDeckUids(prev => {
      const newActive = prev.includes(uid) ? prev.filter(id => id !== uid) : [...prev, uid];
      saveProgressToCloud(offChainRadh, collection, newActive, exhaustedUids, plots, sector, week, hull);
      return newActive;
    });
  };

  const handleNextWeekStart = () => {
    if(activeDeckUids.length < 10) return showNotification("You must assign at least 10 cards to your Active Deck in the Deck Manager!");

    let nextWeek = week + 1;
    let nextSector = sector;
    if (nextWeek > 4) {
      nextWeek = 1;
      nextSector++;
    }

    const validActiveCards = collection.filter(c => activeDeckUids.includes(c.uid) && !exhaustedUids.includes(c.uid));
    startWeek(validActiveCards, nextSector, nextWeek);
  };

  // --- CARD RENDERER ---
  const renderCard = (card, index, canPlay, context = 'hand') => {
    let typeStyle = "from-slate-800 to-slate-950 border-slate-600/50 shadow-slate-900";
    let iconColor = "text-slate-400";
    if (card.type === 'seed') { typeStyle = "from-emerald-900 to-slate-950 border-emerald-500/30"; iconColor = "text-emerald-500/50"; }
    if (card.type === 'nurture') { typeStyle = "from-cyan-900 to-slate-950 border-cyan-500/30"; iconColor = "text-cyan-500/50"; }
    if (card.type === 'harvest') { typeStyle = "from-amber-900 to-slate-950 border-amber-500/30"; iconColor = "text-amber-500/50"; }
    if (card.type === 'engineering') { typeStyle = "from-rose-900 to-slate-950 border-rose-500/30"; iconColor = "text-rose-500/50"; }
    if (card.type === 'expansion') { typeStyle = "from-indigo-900 to-slate-950 border-indigo-500/30"; iconColor = "text-indigo-400/50"; }
    if (card.isMythic) { typeStyle = "from-fuchsia-900 to-purple-950 border-fuchsia-400/80 shadow-[0_0_15px_rgba(217,70,239,0.3)]"; iconColor = "text-fuchsia-300"; }

    const isMarket = context === 'market';
    const isLedger = context === 'ledger';
    const isDeckMgr = context === 'deck_manager';
    const isActiveInDeck = isDeckMgr ? activeDeckUids.includes(card.uid) : true;

    const handleClick = () => {
      if (isMarket) buyCardWithSlop(card);
      else if (isLedger) buyCardWithHam(card);
      else if (isDeckMgr) toggleDeckCard(card.uid);
      else playCard(index);
    };

    return (
      <button key={card.instanceId || card.uid || index} onClick={handleClick} disabled={isTransacting || (isMarket && offChainRadh < card.price) || (isLedger && onChainHam < card.priceHam) || (context==='hand' && !canPlay)}
        className={`relative group w-28 h-40 md:w-40 md:h-56 rounded-xl border flex flex-col text-left transition-all duration-300 shrink-0 snap-center bg-gradient-to-b

  // ==========================================

            <div className="flex-1 flex items-center justify-center p-4 overflow-y-auto pb-64 md:pb-8 custom-scrollbar">
              <div className="flex gap-2 sm:gap-4 flex-wrap w-full justify-center max-w-4xl">
                {plots.map((plot, idx) => (
                  <div key={idx} className="w-16 h-32 sm:w-24 sm:h-48 rounded-full shrink-0 bg-slate-950 border-4 border-slate-800 flex flex-col items-center justify-end p-2 shadow-inner relative transition-all">
                    <div className="absolute bottom-0 w-full h-1/3 bg-gradient-to-t from-emerald-900/20 to-transparent" />
                    {plot ? (
                      <div className="relative z-10 flex flex-col items-center w-full h-full justify-end pb-2">
                        <span className={`w-8 h-8 sm:w-12 sm:h-12 ${plot.color} ${plot.growth >= plot.maxGrowth ? 'animate-pulse drop-shadow-[0_0_10px_currentColor]' : 'opacity-70'} mb-2 text-3xl flex items-center justify-center`}>🌱</span>

                          <div className="flex justify-center gap-0.5 mt-1">

                  <span className="text-sm font-bold text-blue-100">{energy} <span className="text-slate-600">/ {maxEnergy}</span></span>

                <button onClick={endDay} className="flex items-center gap-2 px-6 py-2 bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold uppercase tracking-widest rounded-full shadow-[0_0_15px_rgba(16,185,129,0.3)] transition-all">

           <div className="absolute inset-0 flex items-center justify-center p-4 bg-black/90 z-50">
              <div className="bg-slate-900 p-12 rounded-3xl border border-slate-700 text-center shadow-2xl max-w-lg">
                 {gameState === 'WIN' ? <span className="inline-block" style={{fontFamily: 'sans-serif', margin: '0 4px'}}>✅</span> : <span className="inline-block" style={{fontFamily: 'sans-serif', margin: '0 4px'}}>⚠️</span>}
                 <h1 className="text-3xl font-light text-white mb-4 tracking-widest">
                   {gameState === 'WIN' ? 'EXPEDITION COMPLETE' : (hull <= 0 ? 'HULL BREACH' : 'QUOTA FAILED')}
                 </h1>
                 <p className="text-sm text-slate-400 mb-8 leading-relaxed">
                   {gameState === 'WIN'
                     ? 'You have survived all 10 Sectors. The Consortium blockade is broken. The U.S.S. Truffle Hunter sails into unknown space.'
                     : (hull <= 0
                         ? 'The hazards of the Void were too much. The ship has decompressed. You must reboot the simulation, but your Deck Collection remains intact.'
                         : `You failed to meet the weekly quota of ${quota} Slop. The Obsidian Consortium has seized your hydroponics bays. You must reboot the simulation, but your Deck Collection remains intact.`)}
                 </p>
                 <button onClick={clearRunState} className="w-full py-4 bg-slate-800 text-white text-xs font-bold uppercase tracking-widest rounded-full hover:bg-slate-700 transition-all">
                   Return to Hub
                 </button>
              </div>
           </div>
        )}

      </div>

      {/* GLOBAL DESKTOP SCROLLBAR STYLING */}
      <style>{`
        @media (min-width: 768px) {
          .custom-scrollbar::-webkit-scrollbar { height: 10px; width: 10px; }
          .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 8px; margin: 4px; }
          .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.3); border-radius: 8px; border: 2px solid rgba(15,23,42,1); }
          .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(56, 189, 248, 0.6); }
        }
        @media (max-width: 767px) {
          .custom-scrollbar::-webkit-scrollbar { display: none; }
          .custom-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
          .hide-scrollbar::-webkit-scrollbar { display: none; }
          .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        }
      `}</style>
    </div>
  );
}


        const root = ReactDOM.createRoot(document.getElementById('game-root'));
        root.render(<AstralHarvest />);
    </script>
</body>
