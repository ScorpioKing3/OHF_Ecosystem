<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Ham Farms | Space Deck Builder</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="m-0 p-0 overflow-x-hidden bg-[#020024] text-white">

    <!-- Sticky Navigation Bar -->
    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center w-full">
        <div class="flex items-center space-x-6">
            <div class="text-2xl font-orbitron font-bold tracking-wider neon-text-blue">
                <a href="index.html">OLD HAM FARMS</a>
            </div>

            <!-- Player HUD (Hidden by default) -->
            <div id="player-hud" class="hidden items-center space-x-4 ml-6 px-4 py-1 rounded-full border border-gray-600 bg-[#020024] bg-opacity-80 text-sm font-orbitron">
                <span id="hud-agent" class="text-gray-300 font-bold">Agent: ...</span>
                <span class="text-gray-500">|</span>
                <span id="hud-ham" class="neon-text-blue font-bold">$HAM: 0</span>
                <span class="text-gray-500">|</span>
                <span id="hud-radh" class="neon-text-purple font-bold">$RADH: 0</span>
            </div>
        </div>

        <div class="space-x-6 text-lg font-medium flex items-center">
            <a href="index.html" class="hover:text-blue-400 transition-colors">Home</a>
            <a href="hub.html" class="hover:text-purple-400 transition-colors">Community Hub</a>
            <a href="hangar.html" class="hover:text-purple-400 transition-colors">Hangar Bay</a>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-32 flex flex-col items-center justify-center min-h-[70vh]">
        <div class="glass p-12 rounded-2xl border border-gray-600 text-center animate-pulse">
            <h1 class="text-5xl font-orbitron font-bold mb-6 neon-text-blue">Space Deck Builder</h1>
            <p class="text-2xl text-gray-300 font-orbitron tracking-wider">Game Loading...</p>
        </div>
    </div>

    <!-- Firebase and Logic Scripts -->
    <script type="module" src="auth.js"></script>
    <script type="module" src="wallet.js"></script>
</body>
</html>
